{% extends "admin_panel/base.html" %}
{% block title %}Model{% endblock %}
{% block heading %}{% if object %}Edit model{% else %}Add model{% endif %}{% endblock %}
{% block content %}
<form method="post" class="max-w-lg bg-white rounded-xl border p-6 space-y-4">
    {% csrf_token %}
    {% for field in form %}
    <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">{{ field.label }}</label>
        {{ field.errors }}
        {{ field }}
    </div>
    {% endfor %}
    <button type="submit" class="px-4 py-2 bg-blue-600 text-white text-sm rounded-lg">Save</button>
    <a href="{% url 'admin_panel:carmodel_list' %}" class="ap-btn ap-btn-neutral">Cancel</a>
</form>
{% endblock %}
