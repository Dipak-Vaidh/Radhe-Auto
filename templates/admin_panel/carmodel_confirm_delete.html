{% extends "admin_panel/base.html" %}
{% block title %}Delete model{% endblock %}
{% block heading %}Delete model{% endblock %}
{% block content %}
<div class="bg-white rounded-xl border p-6 max-w-lg">
    <p class="mb-4">Delete <strong>{{ object.brand.name }} {{ object.name }}</strong>?</p>
    <form method="post" class="flex flex-wrap gap-2 items-center">{% csrf_token %}
        <button type="submit" class="inline-flex items-center px-4 py-2 bg-red-600 text-white text-sm font-medium rounded-lg border border-red-700 shadow-sm hover:bg-red-700">Delete</button>
        <a href="{% url 'admin_panel:carmodel_list' %}" class="ap-btn ap-btn-neutral">Cancel</a>
    </form>
</div>
{% endblock %}
